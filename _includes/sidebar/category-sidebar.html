<style type="text/css" media="screen">
.category-sidebar {
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: auto;
  max-height: calc(100vh - 120px);
}

.category-sidebar-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 0.8rem;
  color: #2c3e50;
  border-bottom: 2px solid #3498db;
  padding-bottom: 0.4rem;
  flex-shrink: 0;
}

.category-sidebar-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  margin-bottom: 0.8rem;
  scrollbar-width: thin;
  scrollbar-color: #3498db #f1f1f1;
}

.category-sidebar-content::-webkit-scrollbar {
  width: 6px;
}

.category-sidebar-content::-webkit-scrollbar-track {
  background: #f1f1f1;
}

.category-sidebar-content::-webkit-scrollbar-thumb {
  background: #3498db;
  border-radius: 3px;
}

.category-sidebar-content::-webkit-scrollbar-thumb:hover {
  background: #2980b9;
}

.category-sidebar-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.category-sidebar-item {
  margin-bottom: 0.4rem;
}

.category-sidebar-link {
  display: block;
  padding: 0.4rem 0.6rem;
  border-radius: 3px;
  text-decoration: none;
  color: #555;
  font-size: 0.85rem;
  transition: all 0.2s ease;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.category-sidebar-link:hover {
  background-color: #f8f9fa;
  color: #3498db;
  padding-left: 0.8rem;
}

.category-sidebar-link.active {
  background-color: #3498db;
  color: white;
  font-weight: 500;
}

.category-sidebar-pagination {
  flex-shrink: 0;
  padding: 0.6rem;
  background-color: #f8f9fa;
  border-radius: 4px;
  border: 1px solid #e9ecef;
}

.category-pagination-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.category-sidebar-page-info {
  font-size: 0.8rem;
  color: #666;
  font-weight: 500;
}

.category-sidebar-nav-btn {
  padding: 0.2rem 0.6rem;
  border: 1px solid #dee2e6;
  background-color: white;
  color: #495057;
  border-radius: 3px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s ease;
  font-weight: 500;
}

.category-sidebar-nav-btn:hover:not(:disabled) {
  background-color: #3498db;
  color: white;
  border-color: #3498db;
}

.category-sidebar-nav-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.category-items-per-page {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: #666;
}

.category-items-select {
  padding: 0.2rem 0.4rem;
  border: 1px solid #dee2e6;
  border-radius: 3px;
  font-size: 0.75rem;
  background-color: white;
  color: #495057;
  cursor: pointer;
}

.category-items-select:focus {
  outline: none;
  border-color: #3498db;
}

/* Dark mode support */
@media (prefers-color-scheme: dark) {
  .category-sidebar-title {
    color: #ecf0f1;
    border-bottom-color: #3498db;
  }

  .category-sidebar-content::-webkit-scrollbar-track {
    background: #2c3e50;
  }

  .category-sidebar-content::-webkit-scrollbar-thumb {
    background: #3498db;
  }

  .category-sidebar-link {
    color: #bdc3c7;
  }

  .category-sidebar-link:hover {
    background-color: #2c3e50;
    color: #3498db;
  }

  .category-sidebar-pagination {
    background-color: #2c3e50;
    border-color: #34495e;
  }

  .category-sidebar-page-info,
  .category-items-per-page {
    color: #bdc3c7;
  }

  .category-sidebar-nav-btn {
    background-color: #34495e;
    color: #bdc3c7;
    border-color: #4a5568;
  }

  .category-sidebar-nav-btn:hover:not(:disabled) {
    background-color: #3498db;
    color: white;
    border-color: #3498db;
  }

  .category-items-select {
    background-color: #34495e;
    color: #bdc3c7;
    border-color: #4a5568;
  }
}
</style>

<div class="category-sidebar">
  <div class="category-sidebar-title" id="categoryTitle">同分类文章</div>
  <div class="category-sidebar-content">
    <ul class="category-sidebar-list" id="categoryList"></ul>
  </div>
  <div class="category-sidebar-pagination" id="categoryPagination"></div>
</div>

<script>
(function() {
  // Configuration
  const CONFIG = {
    itemsPerPage: 10,
    currentPage: 1,
    currentCategory: null,
    posts: []
  };

  // Get current page category (first item in categories array)
  function getCurrentCategory() {
    const pageElement = document.querySelector('meta[property="article:category"]');
    if (pageElement) {
      return pageElement.getAttribute('content');
    }

    // Try to get from page data - parse categories array
    try {
      const pageContent = document.querySelector('.post-content');
      if (pageContent) {
        // Look for front matter data in page
        const scripts = document.querySelectorAll('script');
        for (let script of scripts) {
          const text = script.textContent;
          if (text.includes('categories:')) {
            // Match categories array: categories: [item1, item2, ...]
            const arrayMatch = text.match(/categories:\s*\[\s*['"]([^'"]+)['"]/);
            if (arrayMatch) {
              return arrayMatch[1]; // Return first category in array
            }
            // Fallback: single category without array
            const singleMatch = text.match(/categories:\s*['"]([^'"]+)['"]/);
            if (singleMatch) {
              return singleMatch[1];
            }
          }
        }
      }
    } catch (error) {
      console.error('Error getting category:', error);
    }

    return null;
  }

  // Get all posts from same category
  function getPostsByCategory(category) {
    const allPosts = [];

    // Try to get posts from navigation links
    const postLinks = document.querySelectorAll('a[href*="/posts/"], a[href*="/page"]');

    postLinks.forEach(link => {
      const href = link.getAttribute('href');
      const title = link.textContent.trim();

      if (href && title && href.includes('.html')) {
        allPosts.push({
          title: title,
          url: href
        });
      }
    });

    // Also try to get posts from related posts section
    const relatedLinks = document.querySelectorAll('.post-related a.post-link');
    relatedLinks.forEach(link => {
      const href = link.getAttribute('href');
      const title = link.textContent.trim();

      if (href && title && !allPosts.find(post => post.url === href)) {
        allPosts.push({
          title: title,
          url: href
        });
      }
    });

    // Filter out duplicates and sort
    const uniquePosts = [];
    const seenUrls = new Set();
    allPosts.forEach(post => {
      if (!seenUrls.has(post.url)) {
        seenUrls.add(post.url);
        uniquePosts.push(post);
      }
    });

    // Limit to reasonable number
    return uniquePosts.slice(0, 50);
  }

  // Render posts for current page
  function renderPosts(page) {
    const listElement = document.getElementById('categoryList');
    const start = (page - 1) * CONFIG.itemsPerPage;
    const end = start + CONFIG.itemsPerPage;
    const pagePosts = CONFIG.posts.slice(start, end);
    const currentUrl = window.location.pathname;

    listElement.innerHTML = pagePosts.map((post, index) => {
      const isActive = post.url === currentUrl ? 'active' : '';
      return `
        <li class="category-sidebar-item">
          <a href="${post.url}" class="category-sidebar-link ${isActive}">
            ${start + index + 1}. ${post.title}
          </a>
        </li>
      `;
    }).join('');

    renderPagination();
  }

  // Render pagination controls
  function renderPagination() {
    const paginationElement = document.getElementById('categoryPagination');
    const totalPages = Math.ceil(CONFIG.posts.length / CONFIG.itemsPerPage);
    const currentPage = CONFIG.currentPage;

    let paginationHTML = `
      <div class="category-pagination-controls">
        <button
          class="category-sidebar-nav-btn"
          onclick="window.categorySidebar.prevPage()"
          ${currentPage === 1 ? 'disabled' : ''}>
          上一页
        </button>
        <div class="category-sidebar-page-info">
          ${currentPage} / ${totalPages}
        </div>
        <button
          class="category-sidebar-nav-btn"
          onclick="window.categorySidebar.nextPage()"
          ${currentPage === totalPages ? 'disabled' : ''}>
          下一页
        </button>
      </div>
      <div class="category-items-per-page">
        <span>每页显示:</span>
        <select class="category-items-select" onchange="window.categorySidebar.changeItemsPerPage(this.value)">
          <option value="5" ${CONFIG.itemsPerPage === 5 ? 'selected' : ''}>5</option>
          <option value="10" ${CONFIG.itemsPerPage === 10 ? 'selected' : ''}>10</option>
          <option value="15" ${CONFIG.itemsPerPage === 15 ? 'selected' : ''}>15</option>
          <option value="20" ${CONFIG.itemsPerPage === 20 ? 'selected' : ''}>20</option>
          <option value="25" ${CONFIG.itemsPerPage === 25 ? 'selected' : ''}>25</option>
        </select>
      </div>
    `;

    paginationElement.innerHTML = paginationHTML;
  }

  // Initialize sidebar
  function init() {
    CONFIG.currentCategory = getCurrentCategory();

    if (CONFIG.currentCategory) {
      document.getElementById('categoryTitle').textContent = CONFIG.currentCategory;
      CONFIG.posts = getPostsByCategory(CONFIG.currentCategory);
    } else {
      CONFIG.posts = getPostsByCategory('All');
    }

    // Set current page based on current post
    const currentUrl = window.location.pathname;
    const currentIndex = CONFIG.posts.findIndex(post => post.url === currentUrl);
    if (currentIndex !== -1) {
      CONFIG.currentPage = Math.floor(currentIndex / CONFIG.itemsPerPage) + 1;
    }

    renderPosts(CONFIG.currentPage);

    // Expose methods globally
    window.categorySidebar = {
      nextPage: function() {
        const totalPages = Math.ceil(CONFIG.posts.length / CONFIG.itemsPerPage);
        if (CONFIG.currentPage < totalPages) {
          CONFIG.currentPage++;
          renderPosts(CONFIG.currentPage);
        }
      },
      prevPage: function() {
        if (CONFIG.currentPage > 1) {
          CONFIG.currentPage--;
          renderPosts(CONFIG.currentPage);
        }
      },
      goToPage: function(page) {
        const totalPages = Math.ceil(CONFIG.posts.length / CONFIG.itemsPerPage);
        if (page >= 1 && page <= totalPages) {
          CONFIG.currentPage = page;
          renderPosts(CONFIG.currentPage);
        }
      },
      changeItemsPerPage: function(value) {
        CONFIG.itemsPerPage = parseInt(value);
        CONFIG.currentPage = 1; // Reset to first page
        renderPosts(CONFIG.currentPage);
      }
    };
  }

  // Run initialization
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
